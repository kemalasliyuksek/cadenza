{% extends "base.html" %}
{% block title %}Add Playlist — Cadenza{% endblock %}

{% block content %}
<hgroup>
    <h1>Add Playlist</h1>
    <p>Paste a Spotify playlist URL</p>
</hgroup>

<form method="POST" action="{{ url_for('playlists.add') }}">
    <label for="url">Spotify Playlist URL</label>
    <input type="text" id="url" name="url"
           placeholder="https://open.spotify.com/playlist/..."
           required autofocus>
    <small>Supports Spotify URLs and URIs (e.g., <code>spotify:playlist:xxxxx</code>)</small>

    <button type="submit">Add Playlist</button>
</form>
{% endblock %}
